    <video width="560" height="315" controls>
      <source src="img/video.mp4" type="video/mp4" />
    </video>

    <h1>웹프로그래밍 영상</h1>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/4mRae9N2pU4?si=1OuiXIuKiGCV0sHA"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h1>비 내리는 소리</h1>
