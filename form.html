    <form action="">
      <fieldset>
        <legend>로그인</legend>
        <label for="user-id">아이디</label>
        <input
          type="text"
          id="user-id"
          size="42"
          maxlength="20"
        />
        <br />

        <label for="user-pass">비밀번호</label>
        <input type="password" id="user-pass" size="40" />
        <br />

        <input type="submit" value="로그인"/>
      </fieldset>
    </form>

    <form action="">
      <label for="fname">First name:</label>
      <input type="text" id="fname" name="fname" /><br />
      <label for="lname">Last name:</label>
      <input type="text" id="lname" name="lname"  /><br />
    </form>

    <fieldset>
    <legend>부가 정보</legend>
    <p>
      <label>관심 분야:</label>
      <input type="checkbox" name="hobby" value="html"> HTML
      <input type="checkbox" name="hobby" value="css"> CSS
      <input type="checkbox" name="hobby" value="js"> JS
    </p>
    <p>
      <label for="path">가입 경로:</label>
      <input type="checkbox" name="path" value="internet"> 인터넷 검색
      <input type="checkbox" name="path" value="friend"> 지인 추천
      <input type="checkbox" name="path" value="ad"> 광고
      <input type="checkbox" name="path" value="other"> 기타
    </p>
  </fieldset>
    
    <form>
      <label for="favcolor">Select your favorite color:</label>
      <input type="color" id="favcolor" name="favcolor" /><br/>

      <label for="birthday">Your Birthday:</label>
      <input type="date" id="birthday" name="birthday" />
    </form></br>

    <input type="submit" value="Submit" />
    <input type="reset" value="Reset" />

    <script src="main.js"></script>
